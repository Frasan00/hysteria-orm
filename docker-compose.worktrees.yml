services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
    # No host port mapping — internal-only network.

  postgres:
    image: postgres:16.8
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: test
    # No host port mapping.

  mariadb:
    image: mariadb:10.5
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
    # No host port mapping.

  redis:
    image: redis:6
    environment:
      - REDIS_PASSWORD=root
    # No host port mapping.

  mongo:
    image: mongo:4.4
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    # No host port mapping.

  cockroachdb:
    image: "cockroachdb/cockroach:v25.1.1"
    command: start-single-node --insecure
    environment:
      COCKROACH_USER: root
      COCKROACH_PASSWORD: root
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No host port mapping.

  cockroach-init:
    image: "cockroachdb/cockroach:v25.1.1"
    depends_on:
      cockroachdb:
        condition: service_healthy
    volumes:
      - ./scripts/init_cockroachdb.sh:/init_cockroachdb.sh
    entrypoint: "/bin/bash"
    command: /init_cockroachdb.sh

  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: Password123!
    # No host port mapping.

  oracle:
    image: "container-registry.oracle.com/database/free:23.7.0.0-lite"
    environment:
      ORACLE_PWD: "oracle"
      ORACLE_SID: "FREE"
    volumes:
      - ./scripts/oracle:/opt/oracle/scripts/startup:ro
    # No host port mapping.

  node:
    image: node:22
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sleep infinity
    depends_on:
      - mysql
      - postgres
      - mariadb
      - redis
      - mongo
      - cockroachdb
      - mssql
      - oracle

volumes:
  cockroach-data:
    driver: local
  node_modules:
    driver: local
